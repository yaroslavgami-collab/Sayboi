<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAY BOI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#090909;

color:white;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

}

/* Флаг */

.flag{

position:absolute;

width:950px;

opacity:.06;

pointer-events:none;

user-select:none;

}

/* Затемнение */

.overlay{

position:absolute;

width:100%;

height:100%;

background:rgba(0,0,0,.45);

backdrop-filter:blur(3px);

}

/* Контейнер */

.container{

position:relative;

z-index:10;

width:88%;

max-width:380px;

text-align:center;

animation:fade .8s ease;

}

/* Логотип */

.logo{

width:90px;

height:90px;

margin:auto;

border-radius:50%;

background:#171717;

border:1px solid #2d2d2d;

display:flex;

justify-content:center;

align-items:center;

font-size:30px;

font-weight:700;

letter-spacing:2px;

box-shadow:0 0 35px rgba(255,255,255,.03);

}

/* Заголовок */

h1{

margin-top:28px;

font-size:34px;

font-weight:700;

letter-spacing:2px;

}

.subtitle{

margin-top:12px;

font-size:16px;

line-height:1.7;

color:#9d9d9d;

}

/* Кнопки */

.btn{

width:100%;

height:58px;

margin-top:22px;

border:none;

border-radius:18px;

background:#181818;

color:white;

font-size:17px;

font-weight:600;

cursor:pointer;

transition:.25s;

border:1px solid #2c2c2c;

}

.btn:hover{

background:#222;

transform:translateY(-2px);

}

.btn:active{

transform:scale(.98);

}

.secondary{

background:transparent;

}

/* Нижний текст */

.footer{

margin-top:45px;

font-size:13px;

color:#666;

}

/* Анимация */

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="overlay"></div>

<img class="flag"
src="https://upload.wikimedia.org/wikipedia/en/a/ae/Flag_of_the_United_Kingdom.svg">

<div class="container">

<div class="logo">
SB
</div>

<h1>SAY BOI</h1>

<p class="subtitle">
Learn real English.<br>
Speak naturally.<br>
Without boring lessons.
</p>

<button class="btn"
onclick="window.location.href='courses.html'">
Buy Course →
</button>

<button class="btn secondary"
onclick="Telegram.WebApp.close()">
Back
</button>

<div class="footer">
Premium English Learning
</div>

</div>

<script>

Telegram.WebApp.ready();

Telegram.WebApp.expand();

</script>

</body>
</html>
