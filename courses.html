<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Choose Course</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#090909;
color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
overflow:hidden;

}

.flag{

position:absolute;
width:950px;
opacity:.05;
pointer-events:none;

}

.overlay{

position:absolute;
width:100%;
height:100%;

background:rgba(0,0,0,.45);
backdrop-filter:blur(3px);

}

.container{

position:relative;
z-index:5;

width:90%;
max-width:390px;

animation:fade .6s;

}

h1{

text-align:center;

font-size:30px;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#8e8e8e;

margin-bottom:35px;

line-height:1.6;

}

/* Карточки */

.card{

background:#161616;

border:1px solid #2b2b2b;

border-radius:22px;

padding:22px;

margin-bottom:18px;

cursor:pointer;

transition:.25s;

}

.card:hover{

transform:translateY(-3px);

background:#202020;

}

.title{

font-size:20px;

font-weight:600;

}

.desc{

margin-top:8px;

color:#909090;

font-size:14px;

line-height:1.5;

}

.price{

margin-top:18px;

font-size:26px;

font-weight:700;

}

.tag{

margin-top:15px;

display:inline-block;

padding:7px 15px;

border-radius:20px;

background:white;

color:black;

font-size:13px;

font-weight:600;

}

button{

width:100%;

height:58px;

margin-top:15px;

background:transparent;

color:white;

border:1px solid #2b2b2b;

border-radius:18px;

font-size:17px;

cursor:pointer;

transition:.25s;

}

button:hover{

background:#1b1b1b;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="overlay"></div>

<img class="flag"
src="https://upload.wikimedia.org/wikipedia/en/a/ae/Flag_of_the_United_Kingdom.svg">

<div class="container">

<h1>Choose your course</h1>

<p class="subtitle">
Choose the program that fits your goals.
</p>

<div class="card"
onclick="window.location.href='payment.html?course=starter'">

<div class="title">
🇬🇧 English Starter
</div>

<div class="desc">
Perfect if you're just beginning your English journey.
</div>

<div class="price">
$19
</div>

</div>

<div class="card"
onclick="window.location.href='payment.html?course=plus'">

<div class="title">
🚀 English Plus
</div>

<div class="desc">
Vocabulary, grammar and speaking practice.
</div>

<div class="price">
$39
</div>

<div class="tag">
Most Popular
</div>

</div>

<div class="card"
onclick="window.location.href='payment.html?course=premium'">

<div class="title">
👑 English Premium
</div>

<div class="desc">
Full course with lifetime access and future updates.
</div>

<div class="price">
$69
</div>

</div>

<button onclick="window.location.href='index.html'">
← Back
</button>

</div>

<script>

if (window.Telegram && Telegram.WebApp) {
    if (window.Telegram && Telegram.WebApp) {
Telegram.WebApp.ready();
Telegram.WebApp.expand();
}
}

</script>

</body>
</html>
